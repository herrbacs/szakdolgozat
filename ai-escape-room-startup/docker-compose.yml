services:
  frontend:
    container_name: ai-escape-room-frontend
    build: 
      context: ${FRONTEND_DOCKER_FILE}
    ports:
      - "3000:3000"
    volumes:
      - ${FRONTEND_DOCKER_FILE}:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_SOCKET_BASE_URL=${SOCKET_BASE_URL}
    networks:
      - app-network
    depends_on:
      - api
  api:
    container_name: ai-escape-room-api
    command: bash -lc "alembic upgrade head && uvicorn app:app --host 0.0.0.0 --port 8000 --reload"
    build: 
      context: ${API_DOCKER_FILE}
    ports:
      - "8000:8000"
    volumes:
      - ${API_DOCKER_FILE}:/app
      - ${API_DOCKER_FILE}/jwt_private.pem:/run/secrets/jwt_private.pem:ro
      - ${API_DOCKER_FILE}/jwt_public.pem:/run/secrets/jwt_public.pem:ro
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SOCKET_SERVER_URL=http://socket:4000
      - STORAGE_ENDPOINT=minio:9000
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_BUCKET=${MINIO_BUCKET:-levels}
      - STORAGE_SECURE=false
      - STORAGE_PUBLIC_BASE_URL=${MINIO_PUBLIC_BASE_URL:-http://localhost:9000}
    depends_on:
      - postgres
      - socket
      - minio-init
    networks:
      - app-network
  socket:
    container_name: ai-escape-room-socket
    build:
      context: ../ai-escape-room-socket
    ports:
      - "4000:4000"
    volumes:
      - ../ai-escape-room-socket:/app
      - /app/node_modules
    environment:
      - SOCKET_PORT=4000
      - CORS_ORIGIN=${CORS_ORIGIN}
    networks:
      - app-network
  postgres:
    image: postgres:16
    container_name: ai-escape-room-db
    restart: always
    environment:
      POSTGRES_USER: escape
      POSTGRES_PASSWORD: escape
      POSTGRES_DB: escape_room
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
  minio:
    image: minio/minio:latest
    container_name: ai-escape-room-minio
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "${MINIO_CONSOLE_PORT:-9002}:9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network
  minio-init:
    image: minio/mc:latest
    container_name: ai-escape-room-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 1; done;
      mc mb --ignore-existing local/${MINIO_BUCKET:-levels};
      mc anonymous set download local/${MINIO_BUCKET:-levels};
      "
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
